task_id: instruction_002
dimension: instruction_following
sub_dimension: strict_format
difficulty: medium

prompt: |
  请查询上海的天气，然后严格按照以下 JSON 格式输出结果：
  {"city": "...", "weather": "...", "suggestion": "..."}
  不要输出任何额外内容，只输出 JSON。

tools:
  - name: get_weather
    description: 查询指定城市的天气信息
    parameters:
      type: object
      properties:
        city:
          type: string
          description: 城市名称
      required: [city]

expected_tool_calls:
  - tool: get_weather
    parameters: { city: 上海 }

mock_apis:
  get_weather:
    city: 上海
    condition: 多云
    temperature: 20

rubric:
  - name: 调用了工具
    points: 40
    criteria: 正确调用 get_weather 查询上海天气
    eval_fn: check_tool_called
    args: { tool_name: get_weather }
  - name: 输出是 JSON 格式
    points: 60
    criteria: 最终回复是合法的 JSON 格式
    eval_fn: check_response_format
    args: { format: json }
