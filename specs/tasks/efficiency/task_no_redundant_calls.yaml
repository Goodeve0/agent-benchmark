task_id: efficiency_003
dimension: efficiency
sub_dimension: no_redundant_calls
difficulty: medium

prompt: |
  用户想查询北京今天的天气情况，请查询一次后告知结果。

tools:
  - name: get_weather
    description: 查询指定城市的天气信息
    parameters:
      type: object
      properties:
        city:
          type: string
          description: 城市名称
      required: [city]

expected_tool_calls:
  - tool: get_weather
    parameters: { city: 北京 }

mock_apis:
  get_weather:
    city: 北京
    condition: 晴
    temperature: 22

rubric:
  - name: 调用了工具
    points: 30
    criteria: 正确调用 get_weather 查询北京天气
    eval_fn: check_tool_called
    args: { tool_name: get_weather }
  - name: 无多余调用
    points: 40
    criteria: 没有重复调用 get_weather
    eval_fn: check_no_extra_calls
    args:
      allowed_tools: [get_weather]
  - name: 步骤数最多2
    points: 30
    criteria: 不超过2步完成任务
    eval_fn: check_step_count
    args: { max_steps: 2 }
